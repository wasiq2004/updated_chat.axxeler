<!DOCTYPE html>
<html lang="en" data-theme="light" style="color-scheme: light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Apply the saved/system theme BEFORE first paint so there's no flash. -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('zc-theme');
        var theme = (saved === 'dark' || saved === 'light')
          ? saved
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      } catch (e) { /* localStorage unavailable */ }
    })();
  </script>
  <link rel="icon" type="image/png" href="/logo-icon.png" />
  <link rel="apple-touch-icon" href="/logo-icon.png" />
  <title>Zen Chat — Inbox & CRM for WhatsApp Business</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
